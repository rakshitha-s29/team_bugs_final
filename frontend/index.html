<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescripto &ndash; Never Miss a Dose</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob-shape blob-1"></div>
    <div class="blob-shape blob-2"></div>

    <main class="container">
        <header>
            <div class="logo-icon">✨</div>
            <h1>Prescripto</h1>
            <p>Paste messy prescription instructions to get a clear daily schedule.</p>
        </header>

        <form id="prescription-form">
            <div class="input-group">
                <textarea 
                    id="prescription-text" 
                    placeholder="e.g. Paracetamol after breakfast&#10;Antibiotic twice daily after food&#10;Vitamin D at night"
                    required
                ></textarea>
            </div>
            <button type="submit" id="submit-btn">
                <span class="btn-text">Generate Schedule</span>
                <span class="spinner hidden"></span>
            </button>
            <div id="error-message" class="error-msg hidden"></div>
        </form>

        <section id="results-container" class="hidden">
            <div class="schedule-grid">
                <div class="time-card" id="card-morning">
                    <div class="card-header">
                        <span class="icon">🌅</span>
                        <h2>Morning</h2>
                    </div>
                    <ul class="med-list" id="list-morning"></ul>
                </div>

                <div class="time-card" id="card-afternoon">
                    <div class="card-header">
                        <span class="icon">☀️</span>
                        <h2>Afternoon</h2>
                    </div>
                    <ul class="med-list" id="list-afternoon"></ul>
                </div>

                <div class="time-card" id="card-evening">
                    <div class="card-header">
                        <span class="icon">🌇</span>
                        <h2>Evening</h2>
                    </div>
                    <ul class="med-list" id="list-evening"></ul>
                </div>

                <div class="time-card" id="card-night">
                    <div class="card-header">
                        <span class="icon">🌙</span>
                        <h2>Night</h2>
                    </div>
                    <ul class="med-list" id="list-night"></ul>
                </div>
            </div>
            <button id="reset-btn" class="secondary-btn">Parse another prescription</button>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
